<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 - 周聪的专属游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        
        h1 {
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .game-container {
            position: relative;
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #0a0a15;
            border-radius: 7px;
        }
        
        .info-panel {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            font-size: 1.2rem;
        }
        
        .info-item {
            background: rgba(0, 255, 136, 0.1);
            padding: 10px 25px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .info-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
        }
        
        .controls {
            margin-top: 25px;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
        
        .controls p {
            margin: 5px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff4757;
            display: none;
            z-index: 10;
        }
        
        .game-over h2 {
            color: #ff4757;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }
        
        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            border-radius: 10px;
            color: #00ff88;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mobile-btn:active {
            background: rgba(0, 255, 136, 0.5);
            transform: scale(0.95);
        }
        
        .mobile-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            #gameCanvas { 
                width: 300px !important; 
                height: 300px !important; 
            }
            .mobile-controls { display: block; }
            .controls { display: none; }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <p class="subtitle">周聪的专属游戏 | 随时来玩</p>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>得分：<span id="finalScore">0</span></p>
            <p style="color: #ffd700;">最高分：<span id="bestScore">0</span></p>
            <button class="btn" onclick="resetGame()">再玩一次</button>
        </div>
    </div>
    
    <div class="info-panel">
        <div class="info-item">
            <div class="info-label">当前得分</div>
            <div class="info-value" id="score">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">最高记录</div>
            <div class="info-value" id="highScore">0</div>
        </div>
    </div>
    
    <button class="btn" onclick="togglePause()" id="pauseBtn">暂停游戏</button>
    
    <div class="controls">
        <p>⌨️ 方向键 ↑ ↓ ← → 或 WASD 控制</p>
        <p>空格键 暂停/继续</p>
    </div>
    
    <div class="mobile-controls">
        <div class="mobile-row">
            <button class="mobile-btn" onclick="changeDirection('up')">↑</button>
        </div>
        <div class="mobile-row">
            <button class="mobile-btn" onclick="changeDirection('left')">←</button>
            <button class="mobile-btn" onclick="changeDirection('down')">↓</button>
            <button class="mobile-btn" onclick="changeDirection('right')">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 100;
        let isPaused = false;
        let isGameOver = false;
        
        document.getElementById('highScore').textContent = highScore;
        
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            isPaused = false;
            isGameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('pauseBtn').textContent = '暂停游戏';
            placeFood();
        }
        
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        function update() {
            if (isPaused || isGameOver) return;
            
            direction = { ...nextDirection };
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            // 穿墙处理
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;
            
            // 撞自己检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
                placeFood();
                // 加速
                if (gameSpeed > 50) {
                    clearInterval(gameLoop);
                    gameSpeed -= 2;
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 画网格
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 画食物
            ctx.fillStyle = '#ff4757';
            ctx.shadowColor = '#ff4757';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 画蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身渐变
                    const gradient = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(0, ${Math.floor(255 * gradient)}, ${Math.floor(136 * gradient)}, 1)`;
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;
            
            // 画蛇眼睛
            const head = snake[0];
            ctx.fillStyle = '#1a1a2e';
            const eyeOffset = gridSize / 4;
            const eyeSize = 3;
            
            if (direction.x === 1) { // 右
                ctx.fillRect(head.x * gridSize + gridSize - 6, head.y * gridSize + 5, eyeSize, eyeSize);
                ctx.fillRect(head.x * gridSize + gridSize - 6, head.y * gridSize + gridSize - 8, eyeSize, eyeSize);
            } else if (direction.x === -1) { // 左
                ctx.fillRect(head.x * gridSize + 3, head.y * gridSize + 5, eyeSize, eyeSize);
                ctx.fillRect(head.x * gridSize + 3, head.y * gridSize + gridSize - 8, eyeSize, eyeSize);
            } else if (direction.y === -1) { // 上
                ctx.fillRect(head.x * gridSize + 5, head.y * gridSize + 3, eyeSize, eyeSize);
                ctx.fillRect(head.x * gridSize + gridSize - 8, head.y * gridSize + 3, eyeSize, eyeSize);
            } else { // 下
                ctx.fillRect(head.x * gridSize + 5, head.y * gridSize + gridSize - 6, eyeSize, eyeSize);
                ctx.fillRect(head.x * gridSize + gridSize - 8, head.y * gridSize + gridSize - 6, eyeSize, eyeSize);
            }
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = highScore;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function resetGame() {
            gameSpeed = 100;
            initGame();
            gameLoop = setInterval(update, gameSpeed);
        }
        
        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续游戏' : '暂停游戏';
        }
        
        function changeDirection(dir) {
            if (isPaused || isGameOver) return;
            
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });
        
        // 开始游戏
        initGame();
        draw();
        gameLoop = setInterval(update, gameSpeed);
    </script>
</body>
</html>
